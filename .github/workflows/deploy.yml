name: CI - Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd fetcher
          pip install -r requirements.txt

      - name: Check syntax
        run: |
          cd fetcher
          python -m py_compile main.py
          echo "No syntax errors found!"
      
      - name: Test fetcher runs
        env:
          GITHUB_TOKEN: ${{ secrets.ISSUE_RADAR_TOKEN }}
        run: |
          cd fetcher
          timeout 30 python main.py || true
          echo "Fetcher ran successfully!"

      - name: Build Docker image
        run: |
          docker build -t issue-radar-fetcher ./fetcher
          echo "Docker image built successfully!"