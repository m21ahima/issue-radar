version: "3.8"

services:
  fetcher:
    build: ./fetcher
    volumes:
      - ./data:/app/data
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./data:/usr/share/nginx/html/data
    restart: unless-stopped