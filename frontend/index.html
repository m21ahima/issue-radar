 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issue Radar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      padding: 24px 40px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #58a6ff;
    }

    header span {
      font-size: 13px;
      color: #8b949e;
    }

    .filters {
      padding: 20px 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid #21262d;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #8b949e;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: #58a6ff;
      color: #58a6ff;
      background: #1f2d3d;
    }

    .stats {
      padding: 16px 40px;
      display: flex;
      gap: 24px;
    }

    .stat {
      font-size: 13px;
      color: #8b949e;
    }

    .stat span {
      color: #e6edf3;
      font-weight: 600;
    }

    .issues-grid {
      padding: 0 40px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .issue-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 18px;
      transition: border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .issue-card:hover {
      border-color: #58a6ff;
    }

    .issue-card .repo {
      font-size: 12px;
      color: #58a6ff;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .issue-card .title {
      font-size: 15px;
      font-weight: 500;
      color: #e6edf3;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .issue-card .label-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      background: #1f2d3d;
      color: #58a6ff;
      border: 1px solid #1f4068;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px;
      color: #8b949e;
    }

    .loading {
      text-align: center;
      padding: 80px;
      color: #8b949e;
    }

    .radar-dot {
      width: 10px;
      height: 10px;
      background: #3fb950;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

<header>
  <span class="radar-dot"></span>
  <h1>Issue Radar</h1>
  <span id="last-updated"></span>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="filterIssues('all')">All</button>
</div>

<div class="stats">
  <div class="stat">Total: <span id="total-count">0</span></div>
  <div class="stat">Repos: <span id="repo-count">0</span></div>
</div>

<div class="issues-grid" id="issues-grid">
  <div class="loading">Loading issues...</div>
</div>

<script>
  let allIssues = [];
  let activeFilter = 'all';

  async function loadIssues() {
    try {
      const res = await fetch('data/new_issues.json');
      allIssues = await res.json();
      renderFilters();
      renderIssues(allIssues);
      document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('issues-grid').innerHTML = '<div class="empty">No issues found yet. Run the fetcher first!</div>';
    }
  }

  function renderFilters() {
    const labels = [...new Set(allIssues.map(i => i.label))];
    const container = document.getElementById('filters');
    container.innerHTML = '<button class="filter-btn active" onclick="filterIssues(\'all\')">All</button>';
    labels.forEach(label => {
      container.innerHTML += `<button class="filter-btn" onclick="filterIssues('${label}')">${label}</button>`;
    });
  }

  function filterIssues(label) {
    activeFilter = label;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    const filtered = label === 'all' ? allIssues : allIssues.filter(i => i.label === label);
    renderIssues(filtered);
  }

  function renderIssues(issues) {
    const grid = document.getElementById('issues-grid');
    const repos = new Set(issues.map(i => i.repo));
    document.getElementById('total-count').textContent = issues.length;
    document.getElementById('repo-count').textContent = repos.size;

    if (issues.length === 0) {
      grid.innerHTML = '<div class="empty">No issues for this filter.</div>';
      return;
    }

    grid.innerHTML = issues.map(issue => `
      <a class="issue-card" href="${issue.url}" target="_blank">
        <div class="repo">⬡ ${issue.repo}</div>
        <div class="title">${issue.title}</div>
        <span class="label-tag">${issue.label}</span>
      </a>
    `).join('');
  }

  loadIssues();
  setInterval(loadIssues, 60000);
</script>

</body>
</html>
